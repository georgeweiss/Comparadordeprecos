:root {
  --bg: #000000;
  --card: #1c1c1e;
  --card-border: rgba(255,255,255,0.09);
  --blue: #0a84ff;
  --green: #30d158;
  --red: #ff453a;
  --text: #ffffff;
  --text-secondary: rgba(255,255,255,0.45);
  --text-tertiary: rgba(255,255,255,0.22);
  --input-bg: #0a0a0a;
  --result-bg: rgba(10,132,255,0.06);
  --spring: cubic-bezier(.34,1.56,.64,1);
  --ease: cubic-bezier(.25,.46,.45,.94);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 120px;
  -webkit-font-smoothing: antialiased;
}

/* Radial blue glow at top */
body::before {
  content: '';
  position: fixed;
  top: -180px;
  left: 50%;
  transform: translateX(-50%);
  width: 700px;
  height: 500px;
  background: radial-gradient(ellipse, rgba(10,132,255,0.13) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  position: relative;
  z-index: 1;
  padding: 52px 20px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.header-logo-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 10px;
}

.header-logo-row img {
  width: 58px;
  height: 58px;
  border-radius: 14px;
  object-fit: cover;
  flex-shrink: 0;
}

.header-title {
  font-size: 30px;
  font-weight: 800;
  letter-spacing: -0.5px;
  line-height: 1.1;
  color: var(--text);
}

.header-subtitle {
  font-size: 14px;
  font-weight: 400;
  color: var(--text-secondary);
  letter-spacing: 0.01em;
  margin-bottom: 20px;
}

/* Pill segmentado */
.pill-counter {
  display: flex;
  align-items: center;
  gap: 0;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px;
  padding: 6px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  backdrop-filter: blur(12px);
  user-select: none;
}

.pill-counter .pill-count {
  color: var(--blue);
  font-weight: 700;
  margin: 0 6px;
  display: inline-block;
  transform-origin: center;
  transition: transform 0.45s var(--spring), color 0.2s;
}

.pill-counter .pill-count.bump {
  animation: countBump 0.45s var(--spring);
}

@keyframes countBump {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.55) translateY(-2px); }
  100% { transform: scale(1); }
}

/* ── CARDS AREA ── */
#cards-container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 0 16px;
  max-width: 560px;
  margin: 0 auto;
}

/* ── CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  overflow: hidden;
  transition: border-color 0.35s var(--ease), box-shadow 0.35s var(--ease);
  animation: cardIn 0.4s var(--spring) both;
}

.card:nth-child(1) { animation-delay: 0.04s; }
.card:nth-child(2) { animation-delay: 0.10s; }
.card:nth-child(3) { animation-delay: 0.16s; }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(18px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.card.winner {
  border-color: rgba(48,209,88,0.5);
  box-shadow: 0 0 0 1px rgba(48,209,88,0.18), 0 8px 32px rgba(48,209,88,0.12);
}

/* Card Header */
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.card-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
  text-transform: uppercase;
}

.badge-best {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(48,209,88,0.14);
  border: 1px solid rgba(48,209,88,0.3);
  border-radius: 100px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 700;
  color: var(--green);
  opacity: 0;
  transform: scale(0.7) translateX(6px);
  transition: opacity 0.35s var(--spring), transform 0.35s var(--spring);
  pointer-events: none;
  white-space: nowrap;
}

.badge-best.visible {
  opacity: 1;
  transform: scale(1) translateX(0);
}

.badge-best svg {
  width: 11px; height: 11px;
  fill: var(--green);
}

/* Card Body — 3 columns */
.card-body {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0;
}

.col {
  padding: 16px 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.col + .col {
  border-left: 1px solid rgba(255,255,255,0.06);
}

.col.result-col {
  background: var(--result-bg);
}

.col-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}

/* Inputs */
.col input {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 9px 10px;
  font-family: 'Sora', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -moz-appearance: textfield;
}

.col input::-webkit-outer-spin-button,
.col input::-webkit-inner-spin-button { -webkit-appearance: none; }

.col input::placeholder { color: var(--text-tertiary); font-weight: 400; }

.col input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(10,132,255,0.18);
}

/* Result box */
.result-box {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 9px 10px;
  font-size: 15px;
  font-weight: 700;
  color: var(--text-secondary);
  min-height: 40px;
  display: flex;
  align-items: center;
  transition: color 0.3s, border-color 0.3s, box-shadow 0.3s, transform 0.35s var(--spring);
  letter-spacing: -0.01em;
}

.result-box.winner-result {
  color: var(--green);
  border-color: rgba(48,209,88,0.35);
  box-shadow: 0 0 12px rgba(48,209,88,0.15);
  transform: scale(1.06);
  text-shadow: 0 0 16px rgba(48,209,88,0.5);
}

/* ── BOTTOM BAR ── */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(32px);
  -webkit-backdrop-filter: blur(32px);
  border-top: 1px solid rgba(255,255,255,0.07);
  display: flex;
  gap: 10px;
  max-width: 560px;
  margin: 0 auto;
}

/* Workaround: fixed bottom bar full-width then inner constrained */
.bottom-bar-outer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(32px);
  -webkit-backdrop-filter: blur(32px);
  border-top: 1px solid rgba(255,255,255,0.07);
}

.bottom-bar-inner {
  display: flex;
  gap: 10px;
  max-width: 560px;
  margin: 0 auto;
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
}

.btn {
  flex: 1;
  border: none;
  border-radius: 14px;
  padding: 15px 10px;
  font-family: 'Sora', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: transform 0.18s var(--spring), opacity 0.18s;
  -webkit-tap-highlight-color: transparent;
}

.btn:active { transform: scale(0.95); }

.btn-add {
  background: var(--blue);
  color: #fff;
}

.btn-add:hover { opacity: 0.88; }

.btn-clear {
  background: rgba(255,69,58,0.14);
  border: 1px solid rgba(255,69,58,0.28);
  color: var(--red);
  flex: 0 0 auto;
  padding: 15px 18px;
}

.btn-clear:hover { background: rgba(255,69,58,0.22); }

.btn svg {
  width: 17px; height: 17px;
  flex-shrink: 0;
}

/* Scroll anchor */
.scroll-anchor { height: 1px; }

<body>

  <header>
    <div class="header-logo-row">
      <img src="logo.jpg" alt="Logo" onerror="this.style.display='none'" />
      <h1 class="header-title">Comparador de Preços</h1>
    </div>
    <p class="header-subtitle">Melhor custo por unidade</p>
    <div class="pill-counter" id="pill">
      Comparando
      <span class="pill-count" id="pill-count">3</span>
      itens
    </div>
  </header>

  <div id="cards-container"></div>
  <div class="scroll-anchor" id="scroll-anchor"></div>

  <div class="bottom-bar-outer">
    <div class="bottom-bar-inner">
      <button class="btn btn-add" id="btn-add" onclick="addCard()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Adicionar item
      </button>
      <button class="btn btn-clear" id="btn-clear" onclick="clearAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
        Limpar
      </button>
    </div>
  </div>

<script>
  let cardCount = 0;

  function formatPrice(raw) {
    // Remove tudo exceto dígitos
    const digits = raw.replace(/\D/g, '');
    if (!digits) return '';
    const num = parseInt(digits, 10);
    return (num / 100).toFixed(2).replace('.', ',');
  }

  function parsePrice(formatted) {
    if (!formatted) return NaN;
    return parseFloat(formatted.replace(',', '.'));
  }

  function createCard() {
    cardCount++;
    const idx = cardCount;
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${idx}`;
    card.dataset.idx = idx;

    card.innerHTML = `
      <div class="card-header">
        <span class="card-label">Opção ${idx}</span>
        <span class="badge-best" id="badge-${idx}">
          <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          Melhor Preço
        </span>
      </div>
      <div class="card-body">
        <div class="col">
          <span class="col-label">Qtd / ml / g</span>
          <input type="number" id="qty-${idx}" placeholder="ex: 500" inputmode="decimal"
            oninput="calc(${idx})" />
        </div>
        <div class="col">
          <span class="col-label">Valor R$</span>
          <input type="text" id="price-${idx}" placeholder="ex: 9,99" inputmode="numeric"
            oninput="onPriceInput(this, ${idx})" />
        </div>
        <div class="col result-col">
          <span class="col-label">R$ / Und</span>
          <div class="result-box" id="result-${idx}">—</div>
        </div>
      </div>
    `;
    return card;
  }

  function onPriceInput(el, idx) {
    const raw = el.value;
    const digits = raw.replace(/\D/g, '');
    if (!digits) { el.value = ''; calc(idx); return; }
    const num = parseInt(digits, 10);
    el.value = (num / 100).toFixed(2).replace('.', ',');
    calc(idx);
  }

  function calc(idx) {
    const qtyEl = document.getElementById(`qty-${idx}`);
    const priceEl = document.getElementById(`price-${idx}`);
    const resultEl = document.getElementById(`result-${idx}`);

    const qty = parseFloat(qtyEl.value);
    const price = parsePrice(priceEl.value);

    if (!isNaN(qty) && qty > 0 && !isNaN(price) && price > 0) {
      const ratio = price / qty;
      resultEl.dataset.value = ratio;
      resultEl.textContent = ratio.toFixed(4).replace('.', ',');
    } else {
      resultEl.dataset.value = '';
      resultEl.textContent = '—';
    }
    highlight();
  }

  function highlight() {
    const cards = document.querySelectorAll('.card');
    let minVal = Infinity;
    let winnerId = null;

    cards.forEach(card => {
      const idx = card.dataset.idx;
      const resultEl = document.getElementById(`result-${idx}`);
      const val = parseFloat(resultEl.dataset.value);
      if (!isNaN(val) && val < minVal) {
        minVal = val;
        winnerId = idx;
      }
    });

    cards.forEach(card => {
      const idx = card.dataset.idx;
      const resultEl = document.getElementById(`result-${idx}`);
      const badge = document.getElementById(`badge-${idx}`);
      const isWinner = idx == winnerId && resultEl.dataset.value !== '';

      card.classList.toggle('winner', isWinner);
      badge.classList.toggle('visible', isWinner);
      resultEl.classList.toggle('winner-result', isWinner);
    });
  }

  function addCard() {
    const container = document.getElementById('cards-container');
    const card = createCard();
    container.appendChild(card);
    updatePill();

    // Scroll to new card
    setTimeout(() => {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 80);
  }

  function clearAll() {
    document.querySelectorAll('.card').forEach(card => {
      const idx = card.dataset.idx;
      const qtyEl = document.getElementById(`qty-${idx}`);
      const priceEl = document.getElementById(`price-${idx}`);
      const resultEl = document.getElementById(`result-${idx}`);
      const badge = document.getElementById(`badge-${idx}`);

      if (qtyEl) qtyEl.value = '';
      if (priceEl) priceEl.value = '';
      if (resultEl) { resultEl.textContent = '—'; resultEl.dataset.value = ''; }
      if (badge) badge.classList.remove('visible');
      card.classList.remove('winner');
      if (resultEl) resultEl.classList.remove('winner-result');
    });
  }

  function updatePill() {
    const count = document.querySelectorAll('.card').length;
    const el = document.getElementById('pill-count');
    el.textContent = count;
    el.classList.remove('bump');
    void el.offsetWidth; // reflow
    el.classList.add('bump');
  }

  // Init with 3 cards
  (function init() {
    for (let i = 0; i < 3; i++) {
      const container = document.getElementById('cards-container');
      container.appendChild(createCard());
    }
    // pill already shows 3 by default; no bump on init
    document.getElementById('pill-count').textContent = '3';
  })();
</script>

</body>
</html>
