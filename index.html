<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Comparador de Preços</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
–bg: #000000;
–card: #1c1c1e;
–input-bg: #0a0a0a;
–border: rgba(255,255,255,0.09);
–border-hi: rgba(255,255,255,0.15);
–sep: rgba(255,255,255,0.06);
–t1: #f5f5f7;
–t2: #aeaeb2;
–t3: #48484a;
–blue: #0a84ff;
–blue-glow: rgba(10,132,255,0.3);
–green: #30d158;
–green-dim: rgba(48,209,88,0.11);
–green-bdr: rgba(48,209,88,0.28);
–green-glow: rgba(48,209,88,0.22);
–red: #ff453a;
–red-dim: rgba(255,69,58,0.12);
–r20: 20px;
–r14: 14px;
–r10: 10px;
}

html { background: var(–bg); }

body {
font-family: ‘Sora’, -apple-system, sans-serif;
background:
radial-gradient(ellipse 90% 30% at 50% 0%, rgba(10,132,255,0.08) 0%, transparent 60%),
radial-gradient(ellipse 60% 25% at 85% 85%, rgba(48,209,88,0.04) 0%, transparent 50%),
var(–bg);
color: var(–t1);
min-height: 100vh;
display: flex;
justify-content: center;
}

.app {
width: 100%;
max-width: 430px;
min-height: 100vh;
display: flex;
flex-direction: column;
}

.header {
display: flex;
flex-direction: column;
align-items: center;
padding: 54px 24px 0;
}

.title-row {
display: flex;
align-items: center;
justify-content: center;
gap: 13px;
width: 100%;
}

.brand-logo {
width: 58px;
height: 58px;
border-radius: 14px;
object-fit: cover;
flex-shrink: 0;
box-shadow: 0 4px 18px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.08);
}

.header-title {
font-size: 30px;
font-weight: 800;
letter-spacing: -1px;
line-height: 1.1;
color: var(–t1);
white-space: nowrap;
}

.header-sub {
font-size: 13px;
font-weight: 400;
color: var(–t2);
text-align: center;
margin-top: 12px;
}

.count-strip {
display: flex;
align-items: center;
background: rgba(255,255,255,0.05);
border: 1px solid var(–border-hi);
border-radius: 14px;
overflow: hidden;
margin-top: 16px;
}

.count-segment {
padding: 8px 15px;
font-size: 12px;
font-weight: 600;
color: var(–t2);
white-space: nowrap;
}

.count-num {
padding: 8px 15px;
font-size: 13px;
font-weight: 800;
color: #fff;
background: var(–blue);
min-width: 40px;
text-align: center;
box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
}

.count-num.pop { animation: numPop .32s cubic-bezier(.34,1.56,.64,1); }
@keyframes numPop {
0%   { transform: scale(1); }
45%  { transform: scale(1.3); }
100% { transform: scale(1); }
}

.divider {
width: 100%;
height: 1px;
margin-top: 18px;
background: linear-gradient(90deg, transparent, var(–border-hi) 30%, var(–border-hi) 70%, transparent);
}

.scroll-body {
flex: 1;
padding: 14px 14px 130px;
display: flex;
flex-direction: column;
gap: 12px;
}

.comparison-item {
background: var(–card);
border: 1px solid var(–border);
border-radius: var(–r20);
overflow: hidden;
box-shadow: 0 1px 0 rgba(255,255,255,0.055) inset, 0 6px 28px rgba(0,0,0,0.38);
transition: border-color .28s, box-shadow .28s;
animation: cardIn .26s cubic-bezier(.4,0,.2,1) both;
}

@keyframes cardIn {
from { opacity:0; transform:translateY(14px) scale(.97); }
to   { opacity:1; transform:translateY(0) scale(1); }
}

.comparison-item:nth-child(1) { animation-delay: .04s; }
.comparison-item:nth-child(2) { animation-delay: .10s; }
.comparison-item:nth-child(3) { animation-delay: .16s; }

.comparison-item.best-value {
border-color: var(–green-bdr);
box-shadow:
0 0 0 1px rgba(48,209,88,0.16),
0 0 36px rgba(48,209,88,0.07),
0 6px 28px rgba(0,0,0,0.38),
0 1px 0 rgba(255,255,255,0.055) inset;
}

.card-head {
display: flex;
align-items: center;
justify-content: space-between;
padding: 11px 16px 10px;
background: rgba(255,255,255,0.02);
border-bottom: 1px solid var(–sep);
}

.card-num {
font-size: 10px;
font-weight: 700;
letter-spacing: 0.12em;
text-transform: uppercase;
color: var(–t3);
transition: color .22s;
}

.best-value .card-num { color: var(–green); }

.best-tag {
display: none;
align-items: center;
gap: 5px;
background: var(–green-dim);
border: 1px solid rgba(48,209,88,0.2);
color: var(–green);
font-size: 10px;
font-weight: 700;
letter-spacing: 0.06em;
text-transform: uppercase;
padding: 4px 11px;
border-radius: 20px;
}

.best-value .best-tag { display: flex; }

.card-body {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
}

.cell {
padding: 12px 11px 14px;
display: flex;
flex-direction: column;
gap: 8px;
border-right: 1px solid var(–sep);
}

.cell:last-child { border-right: none; }

.cell-result {
background: rgba(0,0,0,0.22);
align-items: center;
justify-content: center;
}

.cell-label {
font-size: 9.5px;
font-weight: 700;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–t3);
}

.inp {
background: var(–input-bg);
border: 1.5px solid rgba(255,255,255,0.09);
border-radius: var(–r10);
padding: 11px 6px;
font-size: 16px;
font-weight: 600;
font-family: ‘Sora’, sans-serif;
color: var(–t1);
text-align: center;
width: 100%;
-webkit-appearance: none;
caret-color: var(–blue);
transition: border-color .15s, box-shadow .15s, background .15s;
}

.inp::placeholder { color: var(–t3); font-weight: 400; }

.inp:focus {
outline: none;
border-color: rgba(10,132,255,0.55);
background: rgba(10,132,255,0.07);
box-shadow: 0 0 0 3px rgba(10,132,255,0.12);
}

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

.result-box {
width: 100%;
background: rgba(255,255,255,0.035);
border: 1.5px solid rgba(255,255,255,0.07);
border-radius: var(–r10);
padding: 11px 4px;
text-align: center;
transition: background .25s, border-color .25s, box-shadow .25s;
}

.best-value .result-box {
background: var(–green-dim);
border-color: rgba(48,209,88,0.22);
box-shadow: 0 0 14px rgba(48,209,88,0.1);
}

.result-num {
font-size: 15px;
font-weight: 700;
color: var(–t3);
line-height: 1;
display: block;
transition: color .25s, transform .25s cubic-bezier(.34,1.56,.64,1);
}

.result-num.has-val { color: var(–t2); }

.best-value .result-num {
color: var(–green);
transform: scale(1.1);
text-shadow: 0 0 16px var(–green-glow);
}

.bottom-bar {
position: fixed;
bottom: 0;
left: 50%;
transform: translateX(-50%);
width: 100%;
max-width: 430px;
z-index: 99;
padding: 12px 14px calc(14px + env(safe-area-inset-bottom, 0px));
background: rgba(8,8,10,0.92);
backdrop-filter: blur(32px) saturate(180%);
-webkit-backdrop-filter: blur(32px) saturate(180%);
border-top: 1px solid var(–border);
}

.btn-row {
display: grid;
grid-template-columns: 1.7fr 1fr;
gap: 10px;
}

.btn {
border: none;
border-radius: var(–r14);
padding: 15px 14px;
font-size: 15px;
font-weight: 700;
font-family: ‘Sora’, sans-serif;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
gap: 7px;
transition: all .14s ease;
}

.btn:active { transform: scale(0.96); }
.btn svg { width: 16px; height: 16px; flex-shrink: 0; }

.btn-add {
background: var(–blue);
color: #fff;
box-shadow: 0 4px 20px var(–blue-glow), inset 0 1px 0 rgba(255,255,255,0.18);
}

.btn-clear {
background: var(–red-dim);
color: var(–red);
border: 1px solid rgba(255,69,58,0.2);
}
</style>

</head>
<body>
<div class="app">

  <div class="header">
    <div class="title-row">
      <img class="brand-logo" src="logo.jpg" alt="Logo">
      <span class="header-title">Comparador<br>de Pre&ccedil;os</span>
    </div>
    <div class="header-sub">Melhor custo por unidade</div>
    <div class="count-strip">
      <span class="count-segment">Comparando</span>
      <span class="count-num" id="count-num">3</span>
      <span class="count-segment" id="count-label">itens</span>
    </div>
    <div class="divider"></div>
  </div>

  <div class="scroll-body" id="comparisons"></div>

  <div class="bottom-bar">
    <div class="btn-row">
      <button class="btn btn-add" id="btn-add">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Adicionar item
      </button>
      <button class="btn btn-clear" id="btn-clear">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"></path>
          <path d="M9 6V4h6v2"></path>
        </svg>
        Limpar
      </button>
    </div>
  </div>

</div>
<script>
var wrap     = document.getElementById('comparisons');
var addBtn   = document.getElementById('btn-add');
var clrBtn   = document.getElementById('btn-clear');
var countNum = document.getElementById('count-num');
var countLbl = document.getElementById('count-label');
var total = 0;

function refreshCount() {
var c = wrap.children.length;
countNum.textContent = c;
countLbl.textContent = c === 1 ? ‘item’ : ‘itens’;
countNum.classList.remove(‘pop’);
void countNum.offsetWidth;
countNum.classList.add(‘pop’);
}

function makeCard(n) {
var item = document.createElement(‘div’);
item.className = ‘comparison-item’;

var head = document.createElement(‘div’);
head.className = ‘card-head’;

var lbl = document.createElement(‘span’);
lbl.className = ‘card-num’;
lbl.textContent = ’Op\u00E7\u00E3o ’ + n;

var tag = document.createElement(‘span’);
tag.className = ‘best-tag’;
tag.textContent = ‘\u2605 Melhor Pre\u00E7o’;

head.appendChild(lbl);
head.appendChild(tag);

var body = document.createElement(‘div’);
body.className = ‘card-body’;

var cellQty = document.createElement(‘div’);
cellQty.className = ‘cell’;
var lblQty = document.createElement(‘span’);
lblQty.className = ‘cell-label’;
lblQty.textContent = ‘Qtd / ml / g’;
var inputQty = document.createElement(‘input’);
inputQty.className = ‘inp qty’;
inputQty.type = ‘number’;
inputQty.placeholder = ‘ex: 500’;
inputQty.min = ‘0’;
inputQty.step = ‘any’;
inputQty.setAttribute(‘inputmode’, ‘decimal’);
cellQty.appendChild(lblQty);
cellQty.appendChild(inputQty);

var cellPrc = document.createElement(‘div’);
cellPrc.className = ‘cell’;
var lblPrc = document.createElement(‘span’);
lblPrc.className = ‘cell-label’;
lblPrc.textContent = ‘Valor R$’;
var inputPrc = document.createElement(‘input’);
inputPrc.className = ‘inp prc’;
inputPrc.type = ‘text’;
inputPrc.placeholder = ‘ex: 9,99’;
inputPrc.setAttribute(‘inputmode’, ‘decimal’);
cellPrc.appendChild(lblPrc);
cellPrc.appendChild(inputPrc);

var cellRes = document.createElement(‘div’);
cellRes.className = ‘cell cell-result’;
var lblRes = document.createElement(‘span’);
lblRes.className = ‘cell-label’;
lblRes.textContent = ‘R$ / Und’;
var box = document.createElement(‘div’);
box.className = ‘result-box’;
var num = document.createElement(‘span’);
num.className = ‘result-num’;
num.textContent = ‘\u2014’;
box.appendChild(num);
cellRes.appendChild(lblRes);
cellRes.appendChild(box);

body.appendChild(cellQty);
body.appendChild(cellPrc);
body.appendChild(cellRes);

item.appendChild(head);
item.appendChild(body);

inputQty.addEventListener(‘input’, recalc);

inputPrc.addEventListener(‘input’, function() {
var digits = inputPrc.value.replace(/\D/g, ‘’);
var val = (parseInt(digits, 10) || 0) / 100;
inputPrc.value = val.toFixed(2);
recalc();
});

inputPrc.addEventListener(‘focus’, function() {
setTimeout(function() { inputPrc.select(); }, 0);
});

return item;
}

function recalc() {
var items = wrap.querySelectorAll(’.comparison-item’);
var valid = [];

items.forEach(function(item) {
var q = parseFloat(item.querySelector(’.qty’).value) || 0;
var p = parseFloat(item.querySelector(’.prc’).value) || 0;
var num = item.querySelector(’.result-num’);
item.classList.remove(‘best-value’);
if (q > 0 && p > 0) {
var u = p / q;
num.textContent = u.toFixed(4);
num.classList.add(‘has-val’);
valid.push({ item: item, u: u });
} else {
num.textContent = ‘\u2014’;
num.classList.remove(‘has-val’);
}
});

if (valid.length > 0) {
valid.sort(function(a, b) { return a.u - b.u; });
valid[0].item.classList.add(‘best-value’);
}
}

function addItem() {
total++;
var card = makeCard(total);
if (total > 3) card.style.animationDelay = ‘0s’;
wrap.appendChild(card);
refreshCount();
if (total > 3) {
setTimeout(function() {
card.scrollIntoView({ behavior: ‘smooth’, block: ‘nearest’ });
}, 60);
}
}

function clearAll() {
wrap.querySelectorAll(’.inp’).forEach(function(el) { el.value = ‘’; });
wrap.querySelectorAll(’.result-num’).forEach(function(el) {
el.textContent = ‘\u2014’;
el.classList.remove(‘has-val’);
});
wrap.querySelectorAll(’.comparison-item’).forEach(function(el) {
el.classList.remove(‘best-value’);
});
}

addBtn.addEventListener(‘click’, addItem);
clrBtn.addEventListener(‘click’, clearAll);

addItem();
addItem();
addItem();
</script>

</body>
</html>
