<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Comparador de Preços</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>

*, *::before, *::after {
margin: 0;
padding: 0;
box-sizing: border-box;
-webkit-tap-highlight-color: transparent;
}

:root {
–bg: #000000;
–card: #1c1c1e;
–input-bg: #0a0a0a;
–border: rgba(255,255,255,0.09);
–border-hi: rgba(255,255,255,0.15);
–sep: rgba(255,255,255,0.06);
–t1: #f5f5f7;
–t2: #aeaeb2;
–t3: #48484a;
–blue: #0a84ff;
–blue-glow: rgba(10,132,255,0.3);
–green: #30d158;
–green-dim: rgba(48,209,88,0.11);
–green-bdr: rgba(48,209,88,0.28);
–green-glow: rgba(48,209,88,0.22);
–red: #ff453a;
–red-dim: rgba(255,69,58,0.12);
–r20: 20px;
–r14: 14px;
–r10: 10px;
}

html { background: var(–bg); }

body {
font-family: ‘Sora’, -apple-system, sans-serif;
background:
radial-gradient(ellipse 90% 30% at 50% 0%, rgba(10,132,255,0.08) 0%, transparent 60%),
radial-gradient(ellipse 60% 25% at 85% 85%, rgba(48,209,88,0.04) 0%, transparent 50%),
var(–bg);
color: var(–t1);
min-height: 100vh;
display: -webkit-flex;
display: flex;
-webkit-justify-content: center;
justify-content: center;
}

.app {
width: 100%;
max-width: 430px;
min-height: 100vh;
display: -webkit-flex;
display: flex;
-webkit-flex-direction: column;
flex-direction: column;
}

.header {
display: -webkit-flex;
display: flex;
-webkit-flex-direction: column;
flex-direction: column;
-webkit-align-items: center;
align-items: center;
padding: 54px 24px 0;
}

.title-row {
display: -webkit-flex;
display: flex;
-webkit-align-items: center;
align-items: center;
-webkit-justify-content: center;
justify-content: center;
gap: 13px;
width: 100%;
}

.brand-logo {
width: 58px;
height: 58px;
border-radius: 14px;
object-fit: cover;
-webkit-flex-shrink: 0;
flex-shrink: 0;
box-shadow: 0 4px 18px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.08);
display: block;
}

.header-title {
font-size: 30px;
font-weight: 800;
letter-spacing: -1px;
line-height: 1.1;
color: var(–t1);
white-space: nowrap;
}

.header-sub {
font-size: 13px;
font-weight: 400;
color: var(–t2);
text-align: center;
margin-top: 12px;
}

.count-strip {
display: -webkit-flex;
display: flex;
-webkit-align-items: center;
align-items: center;
background: rgba(255,255,255,0.05);
border: 1px solid var(–border-hi);
border-radius: 14px;
overflow: hidden;
margin-top: 16px;
}

.count-segment {
padding: 8px 15px;
font-size: 12px;
font-weight: 600;
color: var(–t2);
white-space: nowrap;
}

.count-num {
padding: 8px 15px;
font-size: 13px;
font-weight: 800;
color: #fff;
background: var(–blue);
min-width: 40px;
text-align: center;
box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
}

.count-num.pop {
-webkit-animation: numPop .32s cubic-bezier(.34,1.56,.64,1);
animation: numPop .32s cubic-bezier(.34,1.56,.64,1);
}

@-webkit-keyframes numPop {
0%   { -webkit-transform: scale(1); }
45%  { -webkit-transform: scale(1.3); }
100% { -webkit-transform: scale(1); }
}
@keyframes numPop {
0%   { transform: scale(1); }
45%  { transform: scale(1.3); }
100% { transform: scale(1); }
}

.divider {
width: 100%;
height: 1px;
margin-top: 18px;
background: -webkit-linear-gradient(left, transparent, var(–border-hi) 30%, var(–border-hi) 70%, transparent);
background: linear-gradient(90deg, transparent, var(–border-hi) 30%, var(–border-hi) 70%, transparent);
}

.scroll-body {
-webkit-flex: 1;
flex: 1;
padding: 14px 14px 130px;
display: -webkit-flex;
display: flex;
-webkit-flex-direction: column;
flex-direction: column;
gap: 12px;
}

.card {
background: var(–card);
border: 1px solid var(–border);
border-radius: var(–r20);
overflow: hidden;
box-shadow: 0 1px 0 rgba(255,255,255,0.055) inset, 0 6px 28px rgba(0,0,0,0.38);
-webkit-transition: border-color .28s, box-shadow .28s;
transition: border-color .28s, box-shadow .28s;
-webkit-animation: cardIn .26s ease both;
animation: cardIn .26s ease both;
}

@-webkit-keyframes cardIn {
from { opacity: 0; -webkit-transform: translateY(14px); }
to   { opacity: 1; -webkit-transform: translateY(0); }
}
@keyframes cardIn {
from { opacity: 0; transform: translateY(14px); }
to   { opacity: 1; transform: translateY(0); }
}

.card.winner {
border-color: var(–green-bdr);
box-shadow:
0 0 0 1px rgba(48,209,88,0.16),
0 0 36px rgba(48,209,88,0.07),
0 6px 28px rgba(0,0,0,0.38),
0 1px 0 rgba(255,255,255,0.055) inset;
}

.card-head {
display: -webkit-flex;
display: flex;
-webkit-align-items: center;
align-items: center;
-webkit-justify-content: space-between;
justify-content: space-between;
padding: 11px 16px 10px;
background: rgba(255,255,255,0.02);
border-bottom: 1px solid var(–sep);
}

.card-label {
font-size: 10px;
font-weight: 700;
letter-spacing: 0.12em;
text-transform: uppercase;
color: var(–t3);
-webkit-transition: color .22s;
transition: color .22s;
}

.card.winner .card-label { color: var(–green); }

.badge {
display: none;
-webkit-align-items: center;
align-items: center;
gap: 5px;
background: var(–green-dim);
border: 1px solid rgba(48,209,88,0.2);
color: var(–green);
font-size: 10px;
font-weight: 700;
letter-spacing: 0.06em;
text-transform: uppercase;
padding: 4px 11px;
border-radius: 20px;
}

.card.winner .badge { display: -webkit-flex; display: flex; }

.card-body {
display: -webkit-flex;
display: flex;
}

.cell {
-webkit-flex: 1;
flex: 1;
padding: 12px 11px 14px;
display: -webkit-flex;
display: flex;
-webkit-flex-direction: column;
flex-direction: column;
gap: 8px;
border-right: 1px solid var(–sep);
min-width: 0;
}

.cell:last-child { border-right: none; }

.cell-res {
background: rgba(0,0,0,0.22);
}

.cell-label {
font-size: 9px;
font-weight: 700;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–t3);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.inp {
background: var(–input-bg);
border: 1.5px solid rgba(255,255,255,0.09);
border-radius: var(–r10);
padding: 11px 4px;
font-size: 15px;
font-weight: 600;
font-family: ‘Sora’, -apple-system, sans-serif;
color: var(–t1);
text-align: center;
width: 100%;
-webkit-appearance: none;
appearance: none;
-webkit-transition: border-color .15s, box-shadow .15s;
transition: border-color .15s, box-shadow .15s;
}

.inp::-webkit-outer-spin-button,
.inp::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

.inp[type=number] { -moz-appearance: textfield; }

.inp::-webkit-input-placeholder { color: var(–t3); font-weight: 400; }
.inp::-moz-placeholder { color: var(–t3); font-weight: 400; }
.inp::placeholder { color: var(–t3); font-weight: 400; }

.inp:focus {
outline: none;
border-color: rgba(10,132,255,0.55);
background: rgba(10,132,255,0.07);
box-shadow: 0 0 0 3px rgba(10,132,255,0.12);
}

.result-box {
width: 100%;
background: rgba(255,255,255,0.035);
border: 1.5px solid rgba(255,255,255,0.07);
border-radius: var(–r10);
padding: 11px 4px;
text-align: center;
-webkit-transition: background .25s, border-color .25s, box-shadow .25s;
transition: background .25s, border-color .25s, box-shadow .25s;
}

.card.winner .result-box {
background: var(–green-dim);
border-color: rgba(48,209,88,0.22);
box-shadow: 0 0 14px rgba(48,209,88,0.1);
}

.result-val {
font-size: 14px;
font-weight: 700;
color: var(–t3);
line-height: 1;
display: block;
-webkit-transition: color .25s, -webkit-transform .25s;
transition: color .25s, transform .25s;
}

.result-val.has-val { color: var(–t2); }

.card.winner .result-val {
color: var(–green);
-webkit-transform: scale(1.1);
transform: scale(1.1);
text-shadow: 0 0 16px var(–green-glow);
}

.bottom-bar {
position: fixed;
bottom: 0;
left: 50%;
-webkit-transform: translateX(-50%);
transform: translateX(-50%);
width: 100%;
max-width: 430px;
z-index: 99;
padding: 12px 14px 26px;
background: rgba(8,8,10,0.92);
-webkit-backdrop-filter: blur(32px);
backdrop-filter: blur(32px);
border-top: 1px solid var(–border);
}

.btn-row {
display: -webkit-flex;
display: flex;
gap: 10px;
}

.btn {
border: none;
border-radius: var(–r14);
padding: 15px 14px;
font-size: 15px;
font-weight: 700;
font-family: ‘Sora’, -apple-system, sans-serif;
cursor: pointer;
display: -webkit-flex;
display: flex;
-webkit-align-items: center;
align-items: center;
-webkit-justify-content: center;
justify-content: center;
gap: 7px;
-webkit-transition: opacity .14s;
transition: opacity .14s;
}

.btn:active { opacity: 0.75; }

.btn svg {
width: 16px;
height: 16px;
-webkit-flex-shrink: 0;
flex-shrink: 0;
}

.btn-add {
-webkit-flex: 1;
flex: 1;
background: var(–blue);
color: #fff;
box-shadow: 0 4px 20px var(–blue-glow);
}

.btn-clear {
background: var(–red-dim);
color: var(–red);
border: 1px solid rgba(255,69,58,0.2);
padding: 15px 20px;
}

</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="title-row">
      <img class="brand-logo" src="logo.jpg" alt="Logo">
      <span class="header-title">Comparador<br>de Pre&ccedil;os</span>
    </div>
    <div class="header-sub">Melhor custo por unidade</div>
    <div class="count-strip">
      <span class="count-segment">Comparando</span>
      <span class="count-num" id="countNum">3</span>
      <span class="count-segment" id="countLbl">itens</span>
    </div>
    <div class="divider"></div>
  </div>
  <div class="scroll-body" id="cards"></div>
  <div class="bottom-bar">
    <div class="btn-row">
      <button class="btn btn-add" id="btnAdd">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Adicionar item
      </button>
      <button class="btn btn-clear" id="btnClear">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
          <path d="M9 6V4h6v2"></path>
        </svg>
        Limpar
      </button>
    </div>
  </div>
</div>

<script>

(function() {
  var cards   = document.getElementById('cards');
  var btnAdd  = document.getElementById('btnAdd');
  var btnClr  = document.getElementById('btnClear');
  var numEl   = document.getElementById('countNum');
  var lblEl   = document.getElementById('countLbl');
  var n = 0;

  function el(tag, cls) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    return e;
  }

  function setText(e, t) { e.textContent = t; }

  function updateCount() {
    var c = cards.children.length;
    setText(numEl, c);
    setText(lblEl, c === 1 ? 'item' : 'itens');
    numEl.classList.remove('pop');
    numEl.offsetWidth; // reflow
    numEl.classList.add('pop');
  }

  function recalc() {
    var allCards = cards.getElementsByClassName('card');
    var best = null;
    var bestU = Infinity;
    var i, card, q, p, u, valEl;

    for (i = 0; i < allCards.length; i++) {
      card  = allCards[i];
      q     = parseFloat(card.getElementsByClassName('inp-qty')[0].value) || 0;
      p     = parseFloat(card.getElementsByClassName('inp-prc')[0].value) || 0;
      valEl = card.getElementsByClassName('result-val')[0];

      card.classList.remove('winner');

      if (q > 0 && p > 0) {
        u = p / q;
        setText(valEl, u.toFixed(4));
        valEl.classList.add('has-val');
        if (u < bestU) { bestU = u; best = card; }
      } else {
        setText(valEl, '\u2014');
        valEl.classList.remove('has-val');
      }
    }

    if (best) best.classList.add('winner');
  }

  function addCard() {
    n++;

    var card = el('div', 'card');

    // Head
    var head = el('div', 'card-head');
    var lbl  = el('span', 'card-label');
    setText(lbl, 'Op\u00E7\u00E3o ' + n);
    var badge = el('span', 'badge');
    setText(badge, '\u2605 Melhor Pre\u00E7o');
    head.appendChild(lbl);
    head.appendChild(badge);

    // Body
    var body = el('div', 'card-body');

    // Cell Qty
    var cQty = el('div', 'cell');
    var lQty = el('span', 'cell-label');
    setText(lQty, 'Qtd / ml / g');
    var iQty = el('input', 'inp inp-qty');
    iQty.type = 'number';
    iQty.placeholder = 'ex: 500';
    iQty.min = '0';
    iQty.step = 'any';
    iQty.setAttribute('inputmode', 'decimal');
    iQty.addEventListener('input', recalc);
    cQty.appendChild(lQty);
    cQty.appendChild(iQty);

    // Cell Price
    var cPrc = el('div', 'cell');
    var lPrc = el('span', 'cell-label');
    setText(lPrc, 'Valor R$');
    var iPrc = el('input', 'inp inp-prc');
    iPrc.type = 'text';
    iPrc.placeholder = 'ex: 9,99';
    iPrc.setAttribute('inputmode', 'decimal');
    iPrc.addEventListener('input', function() {
      var raw = iPrc.value.replace(/[^0-9]/g, '');
      var num = parseInt(raw, 10) || 0;
      iPrc.value = (num / 100).toFixed(2);
      recalc();
    });
    iPrc.addEventListener('focus', function() {
      var self = iPrc;
      setTimeout(function() { self.select(); }, 0);
    });
    cPrc.appendChild(lPrc);
    cPrc.appendChild(iPrc);

    // Cell Result
    var cRes = el('div', 'cell cell-res');
    var lRes = el('span', 'cell-label');
    setText(lRes, 'R$ / Und');
    var box  = el('div', 'result-box');
    var val  = el('span', 'result-val');
    setText(val, '\u2014');
    box.appendChild(val);
    cRes.appendChild(lRes);
    cRes.appendChild(box);

    body.appendChild(cQty);
    body.appendChild(cPrc);
    body.appendChild(cRes);

    card.appendChild(head);
    card.appendChild(body);
    cards.appendChild(card);
    updateCount();

    if (n > 3) {
      setTimeout(function() {
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 60);
    }
  }

  function clearAll() {
    var inputs = cards.getElementsByClassName('inp');
    var i;
    for (i = 0; i < inputs.length; i++) { inputs[i].value = ''; }
    var vals = cards.getElementsByClassName('result-val');
    for (i = 0; i < vals.length; i++) {
      setText(vals[i], '\u2014');
      vals[i].classList.remove('has-val');
    }
    var allCards = cards.getElementsByClassName('card');
    for (i = 0; i < allCards.length; i++) {
      allCards[i].classList.remove('winner');
    }
  }

  btnAdd.addEventListener('click', addCard);
  btnClr.addEventListener('click', clearAll);

  addCard();
  addCard();
  addCard();
})();

</script>

</body>
</html>
