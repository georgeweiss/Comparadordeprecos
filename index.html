<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparador de Preços</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: auto;
}

.card {
  background: #1c1c1e;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
  text-align: center;
}

.result {
  font-weight: bold;
}

.winner {
  border: 2px solid #30d158;
}

button {
  padding: 15px;
  margin: 10px 5px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.add {
  background: #0a84ff;
  color: white;
}

.clear {
  background: red;
  color: white;
}
</style>
</head>

<body>

<div class="container">
  <h2>Comparador de Preços</h2>
  <p>Melhor custo por unidade</p>

  <div id="cards"></div>

  <button class="add" onclick="addCard()">+ Adicionar</button>
  <button class="clear" onclick="clearAll()">Limpar</button>
</div>

<script>
let total = 0;

function addCard() {
  total++;

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <h4>Opção ${total}</h4>

    <input type="number" placeholder="Quantidade" class="qtd">

    <input type="number" placeholder="Preço (R$)" step="0.01" class="preco">

    <div class="result">-</div>
  `;

  const inputs = card.querySelectorAll("input");
  inputs.forEach(input => input.addEventListener("input", recalc));

  document.getElementById("cards").appendChild(card);
}

function recalc() {
  const cards = document.querySelectorAll(".card");

  let best = null;
  let bestValue = Infinity;

  cards.forEach(card => {
    const qtd = parseFloat(card.querySelector(".qtd").value);
    const preco = parseFloat(card.querySelector(".preco").value);
    const result = card.querySelector(".result");

    card.classList.remove("winner");

    if (qtd > 0 && preco > 0) {
      const unit = preco / qtd;
      result.innerText = "R$ " + unit.toFixed(4);

      if (unit < bestValue) {
        bestValue = unit;
        best = card;
      }
    } else {
      result.innerText = "-";
    }
  });

  if (best) best.classList.add("winner");
}

function clearAll() {
  document.getElementById("cards").innerHTML = "";
  total = 0;
}

// inicia com 3
addCard();
addCard();
addCard();
</script>

</body>
</html>
